<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
<!--
  Ducky "pee" pose, facing RIGHT. Same leg-lift silhouette as Dog/Cat
  Pee for engine consistency. Ducky palette echoes Ducky/Idle:
    #236b61 teal body
    #001714 outline
    #ffaa3a orange beak / feet
    #fff7d0 belly highlight
-->
<!-- Tail held up. -->
<rect x="13" y="23" width="2" height="5" fill="#001714"/>
<rect x="13" y="24" width="1" height="3" fill="#236b61"/>

<!-- Rear body. -->
<rect x="14" y="27" width="11" height="1" fill="#001714"/>
<rect x="14" y="28" width="11" height="4" fill="#236b61"/>
<rect x="15" y="32" width="9" height="2" fill="#fff7d0"/>
<rect x="14" y="34" width="11" height="2" fill="#236b61"/>
<rect x="14" y="36" width="11" height="1" fill="#001714"/>

<!-- Lifted back-left leg (orange). -->
<rect x="13" y="26" width="2" height="2" fill="#001714"/>
<rect x="11" y="24" width="2" height="2" fill="#001714"/>
<rect x="9"  y="22" width="2" height="2" fill="#ffaa3a"/>
<rect x="7"  y="20" width="3" height="2" fill="#ffaa3a"/>

<!-- Standing back-right leg (orange). -->
<rect x="21" y="37" width="3" height="4" fill="#ffaa3a"/>
<rect x="20" y="41" width="5" height="1" fill="#001714"/>

<!-- Front legs (orange). -->
<rect x="31" y="37" width="2" height="4" fill="#ffaa3a"/>
<rect x="29" y="41" width="5" height="1" fill="#001714"/>

<!-- Head + neck (facing right). -->
<rect x="29" y="22" width="2" height="6" fill="#001714"/>
<rect x="30" y="20" width="7" height="1" fill="#001714"/>
<rect x="30" y="21" width="7" height="5" fill="#236b61"/>
<rect x="30" y="26" width="7" height="1" fill="#001714"/>
<!-- Beak -->
<rect x="36" y="22" width="4" height="3" fill="#ffaa3a"/>
<rect x="40" y="23" width="1" height="1" fill="#001714"/>
<!-- Eye -->
<rect x="33" y="22" width="1" height="1" fill="#001714"/>
<rect x="33" y="23" width="1" height="1" fill="#fff7d0"/>

<!-- Pee stream + droplets. -->
<rect x="15" y="29" width="1" height="2" fill="#f5d04a"/>
<rect x="16" y="31" width="1" height="2" fill="#f5d04a"/>
<rect x="17" y="33" width="1" height="2" fill="#f5d04a"/>
<rect x="18" y="35" width="1" height="2" fill="#f5d04a"/>
<rect x="19" y="37" width="1" height="2" fill="#f5d04a"/>
<rect x="20" y="40" width="2" height="1" fill="#f5d04a"/>
<rect x="22" y="41" width="1" height="1" fill="#f5d04a"/>
</svg>
