<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
<!--
  Beagle "sit" pose, side view facing right. Intentionally reuses the
  exact same head, tail, saddle, and body cluster as Idle/tile000 so
  the sit reads as the same dog. Only the leg region is changed: rear
  legs are tucked under, the rump drops to the ground at the back,
  and the front legs become a single straight column. Ground line is
  y=38 to match the standing tiles.
-->
<defs>
  <linearGradient id="belly" x1="0" y1="32" x2="0" y2="34" gradientUnits="userSpaceOnUse" spreadMethod="pad">
    <stop offset="0" stop-color="#f7eede"/>
    <stop offset="1" stop-color="#c89a6a"/>
  </linearGradient>
</defs>

<!-- ============================================================ -->
<!-- Identical-to-idle elements: back/saddle, body, head, tail.   -->
<!-- ============================================================ -->

<!-- Back saddle (brown) on top of the body. -->
<rect x="18" y="25" width="11" height="2" fill="#4a2c18"/>
<rect x="17" y="25" width="1" height="2" fill="#d4a373"/>
<rect x="29" y="25" width="2" height="2" fill="#d4a373"/>

<!-- Body (tan), 14 px wide like idle. -->
<rect x="17" y="27" width="14" height="2" fill="#d4a373"/>
<rect x="17" y="29" width="14" height="3" fill="#d4a373"/>

<!-- Belly highlights (cream). -->
<rect x="17" y="32" width="1" height="1" fill="#a47a52"/>
<rect x="30" y="32" width="1" height="1" fill="#a47a52"/>
<rect x="18" y="32" width="12" height="1" fill="url(#belly)"/>

<!-- Head (identical to idle): crown, ear, snout, eye, nose. -->
<rect x="29" y="23" width="2" height="2" fill="#4a2c18"/>
<rect x="28" y="25" width="2" height="5" fill="#4a2c18"/>
<rect x="27" y="29" width="2" height="2" fill="#4a2c18"/>
<rect x="30" y="23" width="4" height="1" fill="#4a2c18"/>
<rect x="30" y="24" width="5" height="2" fill="#d4a373"/>
<rect x="30" y="26" width="2" height="2" fill="#d4a373"/>
<rect x="32" y="26" width="4" height="2" fill="url(#belly)"/>
<rect x="32" y="28" width="5" height="2" fill="url(#belly)"/>
<rect x="33" y="30" width="3" height="1" fill="url(#belly)"/>
<rect x="32" y="25" width="1" height="1" fill="#1a1410"/>
<rect x="35" y="27" width="1" height="1" fill="#1a1410"/>

<!-- Tail (identical to idle): floppy, tip raised behind. -->
<rect x="15" y="26" width="2" height="2" fill="#4a2c18"/>
<rect x="14" y="25" width="1" height="2" fill="#4a2c18"/>
<rect x="13" y="24" width="1" height="2" fill="#d4a373"/>
<rect x="12" y="23" width="1" height="1" fill="url(#belly)"/>

<!-- ============================================================ -->
<!-- Sit-specific lower body: rump on ground + folded rear + front. -->
<!-- ============================================================ -->

<!-- Rump dropped down to the ground at the back. -->
<rect x="15" y="33" width="7" height="4" fill="#d4a373"/>
<rect x="16" y="34" width="6" height="3" fill="url(#belly)"/>

<!-- Folded rear leg + hock running forward along the ground. -->
<rect x="15" y="36" width="9" height="2" fill="#d4a373"/>
<rect x="15" y="37" width="9" height="1" fill="#a47a52"/>
<rect x="19" y="37" width="1" height="1" fill="#1a1410"/>
<rect x="21" y="37" width="1" height="1" fill="#1a1410"/>
<rect x="23" y="37" width="1" height="1" fill="#1a1410"/>

<!-- Vertical front-leg column under the chest. -->
<rect x="26" y="32" width="3" height="5" fill="#d4a373"/>
<rect x="26" y="35" width="3" height="1" fill="#a47a52"/>
<rect x="25" y="37" width="5" height="1" fill="#d4a373"/>
<rect x="26" y="37" width="1" height="1" fill="#1a1410"/>
<rect x="28" y="37" width="1" height="1" fill="#1a1410"/>

<!-- Collar (red strap with brass tag) at base of neck. -->
<rect x="23" y="27" width="6" height="1" fill="#b53a2b"/>
<rect x="25" y="28" width="2" height="1" fill="#e0c95a"/>
</svg>
