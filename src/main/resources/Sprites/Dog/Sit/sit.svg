<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
<!--
  Beagle "sit" pose, front view. Designed to occupy roughly the same
  vertical extent as Idle/tile000 (y ~22..38, height ~16 px in the
  48x48 viewBox) so a sitting dog visually shrinks onto its haunches
  rather than stretching taller than its standing pose. The previous
  version extended from y=12 to y=38 (~26 px), making the sitting
  beagle render at roughly 2x the height of the standing one.
-->
<defs>
  <linearGradient id="belly" x1="0" y1="28" x2="0" y2="38" gradientUnits="userSpaceOnUse" spreadMethod="pad">
    <stop offset="0" stop-color="#f7eede"/>
    <stop offset="1" stop-color="#c89a6a"/>
  </linearGradient>
</defs>

<!-- Floppy beagle ears flanking the head. Kept short so the head crown sits at idle level. -->
<rect x="16" y="23" width="3" height="5" fill="#4a2c18"/>
<rect x="29" y="23" width="3" height="5" fill="#4a2c18"/>
<rect x="16" y="27" width="3" height="1" fill="#a47a52"/>
<rect x="29" y="27" width="3" height="1" fill="#a47a52"/>

<!-- Head: saddle cap on top, tan face below. -->
<rect x="19" y="22" width="10" height="2" fill="#4a2c18"/>
<rect x="19" y="24" width="10" height="4" fill="#d4a373"/>

<!-- Beagle face mask: dark eyebrow patches with a cream blaze between. -->
<rect x="19" y="24" width="3" height="2" fill="#4a2c18"/>
<rect x="26" y="24" width="3" height="2" fill="#4a2c18"/>
<rect x="23" y="24" width="2" height="2" fill="url(#belly)"/>

<!-- Eyes: forward-facing pupils. -->
<rect x="20" y="25" width="1" height="1" fill="#1a1410"/>
<rect x="27" y="25" width="1" height="1" fill="#1a1410"/>

<!-- Snout (cream) with black nose centered. -->
<rect x="22" y="26" width="4" height="2" fill="url(#belly)"/>
<rect x="23" y="26" width="2" height="1" fill="#1a1410"/>

<!-- Mouth corners (classic dog smile). -->
<rect x="21" y="27" width="1" height="1" fill="#4a2c18"/>
<rect x="26" y="27" width="1" height="1" fill="#4a2c18"/>

<!-- Tail tip just visible behind the right haunch. -->
<rect x="31" y="30" width="2" height="2" fill="#4a2c18"/>
<rect x="32" y="29" width="1" height="2" fill="#d4a373"/>

<!-- Chest / body: compressed so the upright sit stays short. -->
<rect x="18" y="28" width="12" height="1" fill="#d4a373"/>
<rect x="17" y="29" width="14" height="2" fill="#d4a373"/>
<rect x="20" y="29" width="8" height="2" fill="url(#belly)"/>

<!-- Haunches: rear thighs splayed beside the body in a beagle "frog sit". -->
<rect x="15" y="31" width="3" height="5" fill="#d4a373"/>
<rect x="30" y="31" width="3" height="5" fill="#d4a373"/>
<rect x="15" y="33" width="3" height="1" fill="#a47a52"/>
<rect x="30" y="33" width="3" height="1" fill="#a47a52"/>

<!-- Front legs: short columns dropping straight down from the chest to the floor. -->
<rect x="19" y="31" width="3" height="6" fill="#d4a373"/>
<rect x="26" y="31" width="3" height="6" fill="#d4a373"/>
<rect x="20" y="32" width="1" height="4" fill="#a47a52"/>
<rect x="26" y="32" width="1" height="4" fill="#a47a52"/>

<!-- Rear paws fanning out beside the front paws. -->
<rect x="14" y="36" width="5" height="2" fill="#d4a373"/>
<rect x="29" y="36" width="5" height="2" fill="#d4a373"/>
<rect x="14" y="37" width="5" height="1" fill="#a47a52"/>
<rect x="29" y="37" width="5" height="1" fill="#a47a52"/>
<rect x="15" y="37" width="1" height="1" fill="#1a1410"/>
<rect x="17" y="37" width="1" height="1" fill="#1a1410"/>
<rect x="30" y="37" width="1" height="1" fill="#1a1410"/>
<rect x="32" y="37" width="1" height="1" fill="#1a1410"/>

<!-- Front paws: wider tips with toe gaps facing the viewer. -->
<rect x="18" y="36" width="5" height="2" fill="#d4a373"/>
<rect x="25" y="36" width="5" height="2" fill="#d4a373"/>
<rect x="18" y="37" width="5" height="1" fill="#a47a52"/>
<rect x="25" y="37" width="5" height="1" fill="#a47a52"/>
<rect x="19" y="37" width="1" height="1" fill="#1a1410"/>
<rect x="21" y="37" width="1" height="1" fill="#1a1410"/>
<rect x="26" y="37" width="1" height="1" fill="#1a1410"/>
<rect x="28" y="37" width="1" height="1" fill="#1a1410"/>

<!-- Collar (red strap with brass tag) at base of neck, drawn last so it sits on top of the chest. -->
<rect x="19" y="28" width="10" height="1" fill="#b53a2b"/>
<rect x="23" y="29" width="2" height="1" fill="#e0c95a"/>
</svg>
