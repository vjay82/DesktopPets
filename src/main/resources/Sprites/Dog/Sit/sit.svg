<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
<!--
  Beagle "sit" pose, side view facing right. Rear is firmly on the
  ground (rump rests on the floor at y=37), spine slopes up from the
  rump to the shoulders, the head is held HIGH, and the front legs
  are a single straight column from chest to ground. Same palette
  and markings as Idle/tile000 (dark brown saddle + ears + tail tip,
  tan body, cream belly, black eye + nose) so it reads as the same
  beagle in a different pose. Ground line is y=38 to match the
  standing tiles (the front paws and the rear paws sit on y=37).
-->
<defs>
  <linearGradient id="belly" x1="0" y1="30" x2="0" y2="36" gradientUnits="userSpaceOnUse" spreadMethod="pad">
    <stop offset="0" stop-color="#f7eede"/>
    <stop offset="1" stop-color="#c89a6a"/>
  </linearGradient>
</defs>

<!-- ===== Tail (back-left, curled upward off the rump). ===== -->
<rect x="12" y="29" width="1" height="2" fill="url(#belly)"/>
<rect x="13" y="28" width="1" height="2" fill="#d4a373"/>
<rect x="14" y="27" width="1" height="2" fill="#4a2c18"/>
<rect x="15" y="28" width="1" height="2" fill="#4a2c18"/>

<!-- ===== Rump on the ground (the dog's bum). =====
     Rounded block from x=14..21, sitting flat at y=37. Bottom row
     touches the ground so the pose unmistakably reads as "sitting"
     rather than "stooped". -->
<rect x="14" y="31" width="8" height="1" fill="#d4a373"/>
<rect x="13" y="32" width="9" height="1" fill="#d4a373"/>
<rect x="13" y="33" width="9" height="4" fill="#d4a373"/>
<rect x="13" y="37" width="9" height="1" fill="#a47a52"/>

<!-- Cream highlight on the front of the rump (where the inner leg
     meets the belly), so the rump reads as a 3D haunch not a slab. -->
<rect x="19" y="33" width="3" height="4" fill="url(#belly)"/>

<!-- ===== Spine sloping up from rump to shoulders. =====
     A staircase of dark brown segments forms the saddle marking
     along the back, mirroring the saddle position in idle. -->
<rect x="17" y="30" width="6" height="1" fill="#4a2c18"/>
<rect x="20" y="29" width="6" height="1" fill="#4a2c18"/>
<rect x="23" y="28" width="6" height="1" fill="#4a2c18"/>
<rect x="26" y="27" width="5" height="1" fill="#4a2c18"/>

<!-- Tan body filling between the saddle and the belly along the
     slope from rump to chest. -->
<rect x="20" y="30" width="4" height="2" fill="#d4a373"/>
<rect x="22" y="29" width="6" height="2" fill="#d4a373"/>
<rect x="25" y="28" width="6" height="2" fill="#d4a373"/>

<!-- Upright chest column from the slope down to the ground. -->
<rect x="26" y="29" width="5" height="3" fill="#d4a373"/>
<rect x="27" y="32" width="4" height="3" fill="#d4a373"/>
<rect x="26" y="32" width="1" height="3" fill="#a47a52"/>
<rect x="31" y="32" width="1" height="3" fill="#a47a52"/>
<rect x="27" y="33" width="4" height="2" fill="url(#belly)"/>

<!-- ===== Front legs: single straight column under the chest. ===== -->
<rect x="27" y="35" width="4" height="2" fill="#d4a373"/>
<rect x="27" y="36" width="4" height="1" fill="#a47a52"/>
<rect x="26" y="37" width="6" height="1" fill="#d4a373"/>
<rect x="27" y="37" width="1" height="1" fill="#1a1410"/>
<rect x="30" y="37" width="1" height="1" fill="#1a1410"/>

<!-- ===== Folded rear paw peeking out in front of the rump. ===== -->
<rect x="22" y="36" width="3" height="1" fill="#a47a52"/>
<rect x="22" y="37" width="3" height="1" fill="#d4a373"/>
<rect x="24" y="37" width="1" height="1" fill="#1a1410"/>

<!-- ===== Neck connecting chest to the lifted head. ===== -->
<rect x="28" y="25" width="4" height="3" fill="#d4a373"/>
<rect x="28" y="25" width="4" height="1" fill="#4a2c18"/>

<!-- ===== Head held high (looking forward to the right). ===== -->
<!-- Crown/skull -->
<rect x="30" y="20" width="6" height="1" fill="#4a2c18"/>
<rect x="30" y="21" width="6" height="3" fill="#d4a373"/>
<!-- Floppy ear hanging from the back of the head down the neck -->
<rect x="29" y="22" width="2" height="5" fill="#4a2c18"/>
<rect x="28" y="26" width="2" height="2" fill="#4a2c18"/>
<!-- Snout -->
<rect x="34" y="22" width="4" height="3" fill="#d4a373"/>
<rect x="35" y="24" width="4" height="2" fill="url(#belly)"/>
<rect x="36" y="26" width="3" height="1" fill="url(#belly)"/>
<!-- Eye -->
<rect x="33" y="22" width="1" height="1" fill="#1a1410"/>
<!-- Nose -->
<rect x="38" y="24" width="1" height="1" fill="#1a1410"/>
</svg>
