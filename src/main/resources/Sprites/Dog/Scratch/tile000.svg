<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" shape-rendering="crispEdges">
<!--
  Beagle scratch frame 0/3 — paw LOW (chest level).
  Sitting body identical to Sit/tile000. The lifted rear leg is
  drawn LAST so it overlays the body and is clearly visible.
  Tail wag pos: LOW.
-->
<defs>
  <linearGradient id="belly" x1="0" y1="32" x2="0" y2="34" gradientUnits="userSpaceOnUse" spreadMethod="pad">
    <stop offset="0" stop-color="#f7eede"/>
    <stop offset="1" stop-color="#c89a6a"/>
  </linearGradient>
</defs>

<!-- Tail: LOW -->
<rect x="13" y="31" width="2" height="1" fill="#4a2c18"/>
<rect x="12" y="32" width="2" height="2" fill="#4a2c18"/>
<rect x="12" y="34" width="1" height="1" fill="#d4a373"/>

<!-- Rear sitting haunches -->
