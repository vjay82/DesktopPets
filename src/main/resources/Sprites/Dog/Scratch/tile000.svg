<!-- ===== LIFTED REAR LEG (drawn LAST so it overlays the body).
     Frame 0: paw LOW, at chest level. Thigh comes forward from
     rear haunch, shin angles down, paw beside neck. ===== -->
<rect x="22" y="29" width="4" height="2" fill="#a47a52"/>
<rect x="25" y="30" width="3" height="2" fill="#a47a52"/>
<rect x="27" y="31" width="3" height="2" fill="#d4a373"/>
