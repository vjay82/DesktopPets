<rect x="23" y="33" width="3" height="1" fill="url(#belly)"/>
<rect x="22" y="36" width="3" height="1" fill="#a47a52"/>
<rect x="22" y="37" width="3" height="1" fill="#d4a373"/>
<rect x="24" y="37" width="1" height="1" fill="#1a1410"/>

<!-- Front: head/chest/front legs -->
<rect x="24" y="25" width="5" height="2" fill="#4a2c18"/>
<rect x="29" y="25" width="2" height="2" fill="#d4a373"/>
<rect x="24" y="27" width="7" height="2" fill="#d4a373"/>
