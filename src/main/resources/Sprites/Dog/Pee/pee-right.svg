<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
<!--
  Beagle "pee" pose, facing RIGHT (peeing on a tree to the right).
  Front half is taken from Idle/tile000 (head, neck, front legs at x>=24,
  facing right). Rear half is re-posed: the dog stands on its right hind
  leg only, and lifts the LEFT hind leg straight up off the ground in
  the classic dog-marking silhouette. A small yellow arc exits from
  under the raised leg toward the trunk.
  Palette matches Dog/Sit:
    #4a2c18 outline / dark patches
    #d4a373 tan body
    #a47a52 mid-tone (belly shadow)
    #f7eede belly cream
    #1a1410 eye / nose
-->
<defs>
  <linearGradient id="belly" x1="0" y1="32" x2="0" y2="34" gradientUnits="userSpaceOnUse" spreadMethod="pad">
    <stop offset="0" stop-color="#f7eede"/>
    <stop offset="1" stop-color="#c89a6a"/>
  </linearGradient>
</defs>

<!-- ===== Tail: held UP and back, alert. ===== -->
<rect x="13" y="24" width="1" height="3" fill="#4a2c18"/>
<rect x="12" y="22" width="2" height="3" fill="#4a2c18"/>
<rect x="12" y="21" width="1" height="1" fill="#d4a373"/>

<!-- ===== Rear body (haunch + back). ===== -->
<rect x="14" y="27" width="10" height="1" fill="#4a2c18"/>
<rect x="14" y="28" width="10" height="3" fill="#d4a373"/>
<rect x="14" y="31" width="10" height="2" fill="#a47a52"/>
<rect x="14" y="33" width="10" height="1" fill="#d4a373"/>
<rect x="15" y="34" width="10" height="2" fill="#d4a373"/>

<!-- belly highlight under rear -->
<rect x="17" y="33" width="6" height="2" fill="url(#belly)"/>

<!-- ===== LIFTED back-left leg: angled up and back from the hip. ===== -->
<rect x="13" y="26" width="2" height="2" fill="#4a2c18"/>
<rect x="11" y="24" width="2" height="2" fill="#4a2c18"/>
<rect x="9"  y="22" width="2" height="2" fill="#4a2c18"/>
<rect x="8"  y="21" width="2" height="2" fill="#d4a373"/>
<rect x="7"  y="20" width="2" height="1" fill="#a47a52"/>

<!-- ===== Standing back-right leg (the one on the ground). ===== -->
<rect x="21" y="36" width="3" height="5" fill="#4a2c18"/>
<rect x="22" y="36" width="2" height="4" fill="#d4a373"/>
<rect x="20" y="41" width="5" height="1" fill="#4a2c18"/>

<!-- ===== Front legs (preserved from Idle/tile000 style). ===== -->
<rect x="30" y="36" width="2" height="5" fill="#4a2c18"/>
<rect x="33" y="36" width="2" height="5" fill="#4a2c18"/>
<rect x="29" y="41" width="4" height="1" fill="#4a2c18"/>
<rect x="32" y="41" width="4" height="1" fill="#4a2c18"/>

<!-- ===== Head + neck (facing right). ===== -->
<rect x="29" y="23" width="2" height="2" fill="#4a2c18"/>
<rect x="28" y="25" width="2" height="5" fill="#4a2c18"/>
<rect x="27" y="29" width="2" height="2" fill="#4a2c18"/>

<rect x="30" y="23" width="4" height="1" fill="#4a2c18"/>
<rect x="30" y="24" width="5" height="2" fill="#d4a373"/>
<rect x="30" y="26" width="2" height="2" fill="#d4a373"/>
<rect x="32" y="26" width="4" height="2" fill="url(#belly)"/>
<rect x="32" y="28" width="5" height="2" fill="url(#belly)"/>
<rect x="33" y="30" width="3" height="1" fill="url(#belly)"/>

<!-- eye + nose -->
<rect x="32" y="25" width="1" height="1" fill="#1a1410"/>
<rect x="35" y="27" width="1" height="1" fill="#1a1410"/>

<!-- ===== Pee stream + droplets, exiting from under the raised leg
     and arcing down-right toward the trunk. ===== -->
<rect x="15" y="29" width="1" height="2" fill="#f5d04a"/>
<rect x="16" y="31" width="1" height="2" fill="#f5d04a"/>
<rect x="17" y="33" width="1" height="2" fill="#f5d04a"/>
<rect x="18" y="35" width="1" height="2" fill="#f5d04a"/>
<rect x="19" y="37" width="1" height="2" fill="#f5d04a"/>
<!-- splash droplets at ground -->
<rect x="20" y="40" width="2" height="1" fill="#f5d04a"/>
<rect x="22" y="41" width="1" height="1" fill="#f5d04a"/>
</svg>
