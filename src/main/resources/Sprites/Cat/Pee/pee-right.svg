<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
<!--
  Cat "pee" pose, facing RIGHT (peeing on a tree to the right). Cats
  obviously don't pee like dogs in real life, but the engine-level
  contract here is "lifts a leg next to the trunk and emits a stream",
  so the silhouette matches the dog's leg-lift for visual consistency.
  Greyscale palette echoes Cat/Idle:
    #2f2f2e dark grey outline
    #b5b5b5 mid-grey shading
    #e0e0e0 light grey body
    #1a1410 eye/nose
-->
<!-- Tail held up. -->
<rect x="13" y="22" width="2" height="6" fill="#2f2f2e"/>
<rect x="12" y="21" width="3" height="2" fill="#2f2f2e"/>
<rect x="13" y="22" width="1" height="5" fill="#b5b5b5"/>

<!-- Rear haunch. -->
<rect x="14" y="27" width="11" height="1" fill="#2f2f2e"/>
<rect x="14" y="28" width="11" height="3" fill="#e0e0e0"/>
<rect x="14" y="31" width="11" height="2" fill="#b5b5b5"/>
<rect x="14" y="33" width="11" height="2" fill="#e0e0e0"/>
<rect x="14" y="35" width="11" height="1" fill="#2f2f2e"/>

<!-- Lifted back-left leg (up + back). -->
<rect x="13" y="26" width="2" height="2" fill="#2f2f2e"/>
<rect x="11" y="24" width="2" height="2" fill="#2f2f2e"/>
<rect x="9"  y="22" width="2" height="2" fill="#2f2f2e"/>
<rect x="8"  y="21" width="2" height="2" fill="#e0e0e0"/>
<rect x="7"  y="20" width="2" height="1" fill="#b5b5b5"/>

<!-- Standing back-right leg. -->
<rect x="21" y="36" width="3" height="5" fill="#2f2f2e"/>
<rect x="22" y="36" width="2" height="4" fill="#e0e0e0"/>
<rect x="20" y="41" width="5" height="1" fill="#2f2f2e"/>

<!-- Front legs. -->
<rect x="30" y="36" width="2" height="5" fill="#2f2f2e"/>
<rect x="33" y="36" width="2" height="5" fill="#2f2f2e"/>
<rect x="29" y="41" width="4" height="1" fill="#2f2f2e"/>
<rect x="32" y="41" width="4" height="1" fill="#2f2f2e"/>

<!-- Head + neck (facing right). -->
<rect x="29" y="23" width="2" height="2" fill="#2f2f2e"/>
<rect x="28" y="25" width="2" height="5" fill="#2f2f2e"/>
<rect x="27" y="29" width="2" height="2" fill="#2f2f2e"/>
<rect x="30" y="22" width="6" height="1" fill="#2f2f2e"/>
<!-- Ears -->
<rect x="30" y="20" width="2" height="2" fill="#2f2f2e"/>
<rect x="34" y="20" width="2" height="2" fill="#2f2f2e"/>
<!-- Head fill -->
<rect x="30" y="23" width="6" height="2" fill="#e0e0e0"/>
<rect x="30" y="25" width="6" height="2" fill="#b5b5b5"/>
<rect x="30" y="27" width="6" height="3" fill="#e0e0e0"/>
<rect x="33" y="30" width="3" height="1" fill="#b5b5b5"/>
<!-- Eye + nose -->
<rect x="32" y="25" width="1" height="1" fill="#1a1410"/>
<rect x="34" y="26" width="1" height="1" fill="#1a1410"/>
<rect x="35" y="28" width="1" height="1" fill="#1a1410"/>

<!-- Pee stream + droplets. -->
<rect x="15" y="29" width="1" height="2" fill="#f5d04a"/>
<rect x="16" y="31" width="1" height="2" fill="#f5d04a"/>
<rect x="17" y="33" width="1" height="2" fill="#f5d04a"/>
<rect x="18" y="35" width="1" height="2" fill="#f5d04a"/>
<rect x="19" y="37" width="1" height="2" fill="#f5d04a"/>
<rect x="20" y="40" width="2" height="1" fill="#f5d04a"/>
<rect x="22" y="41" width="1" height="1" fill="#f5d04a"/>
</svg>
