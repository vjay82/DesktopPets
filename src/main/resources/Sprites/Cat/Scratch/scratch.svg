<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
<!--
  Cat scratch pose: based on Idle/tile000 (sit) but with the rear-right paw
  lifted toward the ear and a few motion dashes near it. Reads as "cat
  raises a hind paw to scratch behind the ear" at this pixel scale.
-->
<!-- ears -->
<rect x="14" y="20" width="2" height="1" fill="#2f2f2e"/>
<rect x="19" y="20" width="2" height="1" fill="#2f2f2e"/>
<!-- raised paw top outline (sits just beside the right ear) -->
<rect x="22" y="20" width="2" height="1" fill="#2f2f2e"/>
<!-- head row 1 (forehead + ear interiors) -->
<rect x="14" y="21" width="1" height="1" fill="#2f2f2e"/>
<rect x="15" y="21" width="1" height="1" fill="#b5b5b5"/>
<rect x="16" y="21" width="3" height="1" fill="#2f2f2e"/>
<rect x="19" y="21" width="1" height="1" fill="#b5b5b5"/>
<rect x="20" y="21" width="1" height="1" fill="#2f2f2e"/>
<!-- raised paw body (fur centre + outline) -->
<rect x="22" y="21" width="1" height="1" fill="#b5b5b5"/>
<rect x="23" y="21" width="1" height="1" fill="#2f2f2e"/>
<!-- face row -->
<rect x="14" y="22" width="1" height="1" fill="#2f2f2e"/>
<rect x="15" y="22" width="1" height="1" fill="#b5b5b5"/>
<rect x="16" y="22" width="4" height="1" fill="#e0e0e0"/>
<rect x="20" y="22" width="1" height="1" fill="#2f2f2e"/>
<!-- raised leg (drops from paw to body) -->
<rect x="22" y="22" width="2" height="1" fill="#2f2f2e"/>
<!-- eye row -->
<rect x="14" y="23" width="1" height="1" fill="#2f2f2e"/>
<rect x="15" y="23" width="1" height="1" fill="#b5b5b5"/>
<rect x="16" y="23" width="1" height="1" fill="#2f2f2e"/>
<rect x="17" y="23" width="2" height="1" fill="#b5b5b5"/>
<rect x="19" y="23" width="2" height="1" fill="#2f2f2e"/>
<!-- leg continues -->
<rect x="22" y="23" width="1" height="1" fill="#b5b5b5"/>
<rect x="23" y="23" width="1" height="1" fill="#2f2f2e"/>
<!-- chest -->
<rect x="14" y="24" width="1" height="1" fill="#2f2f2e"/>
<rect x="15" y="24" width="1" height="1" fill="#b5b5b5"/>
<rect x="16" y="24" width="4" height="1" fill="#e0e0e0"/>
<rect x="20" y="24" width="1" height="1" fill="#2f2f2e"/>
<!-- leg base joins body -->
<rect x="21" y="24" width="1" height="1" fill="#2f2f2e"/>
<rect x="22" y="24" width="1" height="1" fill="#2f2f2e"/>
<!-- motion dashes (paw vibrating against the ear) -->
<rect x="25" y="20" width="1" height="1" fill="#2f2f2e"/>
<rect x="25" y="22" width="1" height="1" fill="#2f2f2e"/>
<rect x="26" y="21" width="1" height="1" fill="#2f2f2e"/>
<!-- chest row 2 -->
<rect x="14" y="25" width="1" height="1" fill="#2f2f2e"/>
<rect x="15" y="25" width="5" height="1" fill="#b5b5b5"/>
<rect x="20" y="25" width="1" height="1" fill="#2f2f2e"/>
<!-- body -->
<rect x="13" y="26" width="1" height="1" fill="#2f2f2e"/>
<rect x="14" y="26" width="2" height="1" fill="#b5b5b5"/>
<rect x="16" y="26" width="3" height="1" fill="#e0e0e0"/>
<rect x="19" y="26" width="1" height="1" fill="#2f2f2e"/>
<rect x="13" y="27" width="1" height="1" fill="#2f2f2e"/>
<rect x="14" y="27" width="2" height="1" fill="#b5b5b5"/>
<rect x="16" y="27" width="3" height="1" fill="#e0e0e0"/>
<rect x="19" y="27" width="1" height="1" fill="#2f2f2e"/>
<rect x="13" y="28" width="1" height="1" fill="#2f2f2e"/>
<rect x="14" y="28" width="1" height="1" fill="#b5b5b5"/>
<rect x="15" y="28" width="4" height="1" fill="#e0e0e0"/>
<rect x="19" y="28" width="1" height="1" fill="#2f2f2e"/>
<!-- tail + only ONE front paw visible (other is lifted) -->
<rect x="10" y="29" width="3" height="1" fill="#2f2f2e"/>
<rect x="13" y="29" width="2" height="1" fill="#b5b5b5"/>
<rect x="15" y="29" width="1" height="1" fill="#e0e0e0"/>
<rect x="16" y="29" width="1" height="1" fill="#2f2f2e"/>
<rect x="17" y="29" width="1" height="1" fill="#e0e0e0"/>
<rect x="18" y="29" width="1" height="1" fill="#2f2f2e"/>
<rect x="9" y="30" width="1" height="1" fill="#2f2f2e"/>
<rect x="10" y="30" width="2" height="1" fill="#b5b5b5"/>
<rect x="12" y="30" width="1" height="1" fill="#2f2f2e"/>
<rect x="13" y="30" width="2" height="1" fill="#b5b5b5"/>
<rect x="15" y="30" width="1" height="1" fill="#e0e0e0"/>
<rect x="16" y="30" width="1" height="1" fill="#2f2f2e"/>
<rect x="17" y="30" width="1" height="1" fill="#e0e0e0"/>
<rect x="18" y="30" width="1" height="1" fill="#2f2f2e"/>
<!-- baseline (shorter on the right since the rear paw is lifted) -->
<rect x="9" y="31" width="10" height="1" fill="#2f2f2e"/>
</svg>
