<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Cat play-bow pose, LEFT-facing. Mirror of tile000 about viewBox center x=16. -->
  <g transform="translate(32,0) scale(-1,1)">

  <!-- Cat play-bow pose, right-facing.
       Ground line at y=30 (matches Cat/Idle so the cat doesn't
       float when previewed alongside the idle).
       Style: white fur (#e0e0e0), 1-px dark silhouette (#2f2f2e),
       grey belly shading (#b5b5b5), eye/nose dots (#1a1410).
       Layout (right-facing):
         x= 8..15 : rear / hindquarters hump (raised)
         x=10..12 : tail standing up above the rear
         x=16..22 : back sloping down to the head
         x=22..28 : head + chest pressed to the ground
         x=22, x=27 (y=22..24) : two pricked ears
  -->

  <!-- ===== TAIL (vertical, above rear) ===== -->
  <rect x="10" y="12" width="2" height="9" fill="#2f2f2e"/>
  <rect x="11" y="13" width="1" height="7" fill="#e0e0e0"/>

  <!-- ===== HINDQUARTERS (raised hump, left) ===== -->
  <rect x="9"  y="18" width="7" height="1" fill="#2f2f2e"/>
  <rect x="8"  y="19" width="1" height="10" fill="#2f2f2e"/>
  <rect x="9"  y="19" width="7" height="10" fill="#e0e0e0"/>
  <rect x="9"  y="29" width="7" height="1" fill="#2f2f2e"/>

  <!-- ===== SLOPING BACK (staircase wedge to head) ===== -->
  <rect x="16" y="19" width="1" height="1" fill="#2f2f2e"/>
  <rect x="17" y="20" width="1" height="1" fill="#2f2f2e"/>
  <rect x="18" y="21" width="1" height="1" fill="#2f2f2e"/>
  <rect x="19" y="22" width="1" height="1" fill="#2f2f2e"/>
  <rect x="20" y="23" width="2" height="1" fill="#2f2f2e"/>
  <rect x="16" y="20" width="1" height="9" fill="#e0e0e0"/>
  <rect x="17" y="21" width="1" height="8" fill="#e0e0e0"/>
  <rect x="18" y="22" width="1" height="7" fill="#e0e0e0"/>
  <rect x="19" y="23" width="1" height="6" fill="#e0e0e0"/>
  <rect x="20" y="24" width="2" height="5" fill="#e0e0e0"/>
  <rect x="16" y="29" width="6" height="1" fill="#2f2f2e"/>

  <!-- ===== HEAD (low front, right-facing, with ears) ===== -->
  <rect x="22" y="22" width="1" height="2" fill="#2f2f2e"/>
  <rect x="27" y="22" width="1" height="2" fill="#2f2f2e"/>
  <rect x="22" y="24" width="7" height="1" fill="#2f2f2e"/>
  <rect x="22" y="25" width="1" height="4" fill="#2f2f2e"/>
  <rect x="28" y="25" width="1" height="4" fill="#2f2f2e"/>
  <rect x="22" y="29" width="7" height="1" fill="#2f2f2e"/>
  <rect x="23" y="25" width="5" height="4" fill="#e0e0e0"/>

  <!-- ===== EYE + NOSE ===== -->
  <rect x="25" y="26" width="1" height="1" fill="#1a1410"/>
  <rect x="27" y="27" width="1" height="1" fill="#1a1410"/>

  <!-- ===== BELLY SHADING ===== -->
  <rect x="9"  y="28" width="6" height="1" fill="#b5b5b5"/>
  <rect x="16" y="28" width="6" height="1" fill="#b5b5b5"/>
  <rect x="23" y="28" width="5" height="1" fill="#b5b5b5"/>
</g>
</svg>