<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
<!-- Three "Z"s climbing diagonally from bottom-left to top-right, the
     classic "sleepy" emote. Blue with a lighter highlight row, matching
     note.svg's palette. Used for the YAWN activity. -->
<!-- Largest Z (bottom-left, 7 wide) -->
<rect x="3"  y="13" width="7" height="2" fill="#2c4ab0"/>
<rect x="4"  y="14" width="5" height="1" fill="#5b78d6"/>
<rect x="7"  y="15" width="2" height="1" fill="#2c4ab0"/>
<rect x="6"  y="16" width="2" height="1" fill="#2c4ab0"/>
<rect x="5"  y="17" width="2" height="1" fill="#2c4ab0"/>
<rect x="4"  y="18" width="2" height="1" fill="#2c4ab0"/>
<rect x="3"  y="19" width="7" height="2" fill="#2c4ab0"/>
<rect x="4"  y="20" width="5" height="1" fill="#5b78d6"/>
<!-- Middle Z (5 wide) -->
<rect x="9"  y="6" width="5" height="2" fill="#2c4ab0"/>
<rect x="10" y="7" width="3" height="1" fill="#5b78d6"/>
<rect x="12" y="8" width="2" height="1" fill="#2c4ab0"/>
<rect x="11" y="9" width="2" height="1" fill="#2c4ab0"/>
<rect x="10" y="10" width="2" height="1" fill="#2c4ab0"/>
<rect x="9"  y="11" width="5" height="2" fill="#2c4ab0"/>
<rect x="10" y="12" width="3" height="1" fill="#5b78d6"/>
<!-- Smallest Z (top-right, 4 wide) -->
<rect x="15" y="2" width="4" height="1" fill="#2c4ab0"/>
<rect x="17" y="3" width="2" height="1" fill="#2c4ab0"/>
<rect x="16" y="4" width="2" height="1" fill="#2c4ab0"/>
<rect x="15" y="5" width="4" height="1" fill="#2c4ab0"/>
</svg>
