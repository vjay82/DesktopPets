<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
<!-- Pixel-art thought bubble with a small water-droplet icon inside, used to
     telegraph thirst before the DRINK activity. Same bubble silhouette as
     think-food so the pair reads as a single visual vocabulary. -->
<!-- Bubble outline (dark grey) -->
<rect x="6"  y="2"  width="12" height="1" fill="#3a3a3a"/>
<rect x="4"  y="3"  width="2"  height="1" fill="#3a3a3a"/>
<rect x="18" y="3"  width="2"  height="1" fill="#3a3a3a"/>
<rect x="3"  y="4"  width="1"  height="6" fill="#3a3a3a"/>
<rect x="20" y="4"  width="1"  height="6" fill="#3a3a3a"/>
<rect x="4"  y="10" width="2"  height="1" fill="#3a3a3a"/>
<rect x="18" y="10" width="2"  height="1" fill="#3a3a3a"/>
<rect x="6"  y="11" width="12" height="1" fill="#3a3a3a"/>
<!-- Bubble fill (white) -->
<rect x="6"  y="3"  width="12" height="1" fill="#ffffff"/>
<rect x="4"  y="4"  width="16" height="6" fill="#ffffff"/>
<rect x="6"  y="10" width="12" height="1" fill="#ffffff"/>
<!-- Two trailing dots toward the pet (lower-right corner) -->
<rect x="16" y="14" width="2" height="2" fill="#3a3a3a"/>
<rect x="16" y="14" width="1" height="1" fill="#ffffff"/>
<rect x="19" y="17" width="3" height="3" fill="#3a3a3a"/>
<rect x="19" y="17" width="1" height="1" fill="#ffffff"/>
<!-- Water droplet inside the bubble (teardrop). -->
<!-- Outline -->
<rect x="11" y="4"  width="2" height="1" fill="#1e6fb0"/>
<rect x="10" y="5"  width="1" height="1" fill="#1e6fb0"/>
<rect x="13" y="5"  width="1" height="1" fill="#1e6fb0"/>
<rect x="10" y="6"  width="1" height="1" fill="#1e6fb0"/>
<rect x="13" y="6"  width="1" height="1" fill="#1e6fb0"/>
<rect x="9"  y="7"  width="1" height="2" fill="#1e6fb0"/>
<rect x="14" y="7"  width="1" height="2" fill="#1e6fb0"/>
<rect x="10" y="9"  width="1" height="1" fill="#1e6fb0"/>
<rect x="13" y="9"  width="1" height="1" fill="#1e6fb0"/>
<rect x="11" y="10" width="2" height="1" fill="#1e6fb0"/>
<!-- Fill -->
<rect x="11" y="5"  width="2" height="1" fill="#7ec1ee"/>
<rect x="11" y="6"  width="2" height="3" fill="#7ec1ee"/>
<rect x="10" y="7"  width="4" height="2" fill="#7ec1ee"/>
<rect x="11" y="9"  width="2" height="1" fill="#7ec1ee"/>
<!-- Specular highlight -->
<rect x="11" y="7"  width="1" height="1" fill="#d6ebfa"/>
</svg>
