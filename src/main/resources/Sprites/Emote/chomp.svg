<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- A pair of small jaws / teeth biting together, with two crumb flecks -->
  <g stroke="#3a2a1a" stroke-width="1.2" stroke-linejoin="round">
    <!-- upper jaw -->
    <path d="M4 9 L20 9 L18 12 L16 10 L14 12 L12 10 L10 12 L8 10 L6 12 Z" fill="#ffffff"/>
    <!-- lower jaw -->
    <path d="M4 15 L20 15 L18 12 L16 14 L14 12 L12 14 L10 12 L8 14 L6 12 Z" fill="#ffffff"/>
  </g>
  <!-- crumb flecks -->
  <circle cx="3" cy="6" r="1.2" fill="#b0772a"/>
  <circle cx="21" cy="18" r="1" fill="#b0772a"/>
  <circle cx="22" cy="6" r="0.8" fill="#b0772a"/>
</svg>
