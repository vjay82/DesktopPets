<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Sneeze puff cloud: three overlapping puff blobs with soft outline. -->
  <g fill="#e8eef6" stroke="#7d8aa0" stroke-width="0.9">
    <circle cx="8"  cy="13" r="4.2"/>
    <circle cx="14" cy="10" r="4.8"/>
    <circle cx="17" cy="15" r="3.6"/>
    <circle cx="11" cy="16" r="3.0"/>
  </g>
  <!-- Tiny dashes around the cloud to read as "fwoof" motion. -->
  <g fill="none" stroke="#7d8aa0" stroke-width="0.8" stroke-linecap="round">
    <line x1="3"  y1="10" x2="5"  y2="9"/>
    <line x1="20" y1="6"  x2="22" y2="7"/>
    <line x1="21" y1="18" x2="23" y2="19"/>
  </g>
</svg>
