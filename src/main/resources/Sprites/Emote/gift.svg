<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Small gift box emote: pink box, magenta ribbon and bow. -->
  <!-- Box body -->
  <rect x="4" y="10" width="16" height="11" fill="#f08fb6" stroke="#7a1f43" stroke-width="0.9"/>
  <!-- Box lid -->
  <rect x="3" y="8"  width="18" height="3"  fill="#e26a96" stroke="#7a1f43" stroke-width="0.9"/>
  <!-- Vertical ribbon down the middle -->
  <rect x="10.5" y="8" width="3" height="13" fill="#b32869" stroke="#7a1f43" stroke-width="0.4"/>
  <!-- Bow loops -->
  <ellipse cx="9"  cy="6" rx="3.0" ry="2.4" fill="#e26a96" stroke="#7a1f43" stroke-width="0.7"/>
  <ellipse cx="15" cy="6" rx="3.0" ry="2.4" fill="#e26a96" stroke="#7a1f43" stroke-width="0.7"/>
  <!-- Bow knot -->
  <circle cx="12" cy="7" r="1.3" fill="#b32869" stroke="#7a1f43" stroke-width="0.5"/>
</svg>
