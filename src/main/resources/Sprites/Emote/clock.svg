<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Clock: round face with tick marks and two hands pointing to 10:10. -->
  <circle cx="12" cy="12" r="9" fill="#f4e8c2" stroke="#5a3e1b" stroke-width="1.4"/>
  <g stroke="#5a3e1b" stroke-width="1.0" stroke-linecap="round">
    <!-- 12, 3, 6, 9 tick marks -->
    <line x1="12" y1="4"  x2="12" y2="6"/>
    <line x1="20" y1="12" x2="18" y2="12"/>
    <line x1="12" y1="20" x2="12" y2="18"/>
    <line x1="4"  y1="12" x2="6"  y2="12"/>
  </g>
  <!-- Hands: hour to 10, minute to 2. -->
  <line x1="12" y1="12" x2="8"  y2="9"  stroke="#5a3e1b" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="12" y1="12" x2="16" y2="9"  stroke="#5a3e1b" stroke-width="1.0" stroke-linecap="round"/>
  <circle cx="12" cy="12" r="0.9" fill="#5a3e1b"/>
</svg>
