<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Water bowl: same silhouette as the food bowl (so the two read as a
       set), but with a blue water surface and a small ripple instead of
       kibble. Used by Pet.drink() as the prop overlay. -->
  <ellipse cx="50" cy="78" rx="34" ry="6" fill="#000" opacity="0.25"/>
  <path d="M14 55 Q50 95 86 55 Z" fill="#9fa5ab" stroke="#5b6066" stroke-width="2"/>
  <ellipse cx="50" cy="55" rx="36" ry="8" fill="#c8d0d7" stroke="#5b6066" stroke-width="2"/>
  <!-- Water surface -->
  <ellipse cx="50" cy="55" rx="30" ry="5" fill="#3aa0e0"/>
  <ellipse cx="50" cy="55" rx="26" ry="3.5" fill="#7ec1ee"/>
  <!-- Ripple highlights -->
  <ellipse cx="50" cy="54" rx="14" ry="1.2" fill="#d6ebfa"/>
  <ellipse cx="40" cy="56" rx="3"  ry="0.8" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="60" cy="56" rx="2"  ry="0.6" fill="#ffffff" opacity="0.7"/>
</svg>
