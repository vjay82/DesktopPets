<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 120">
  <!-- ground shadow: sits flush at the very bottom of the viewBox so
       there is no transparent gap between the tree and the floor when
       the icon's bottom edge is aligned with the pet's feet. -->
  <ellipse cx="30" cy="119" rx="22" ry="3" fill="#000" opacity="0.25"/>

  <!-- trunk reaches the full bottom of the viewBox (y=120) so the tree
       visually stands on the floor instead of hovering a few px above. -->
  <rect x="25" y="70" width="10" height="50" fill="#6b4222" stroke="#3e2510" stroke-width="1.5"/>
  <!-- trunk highlight -->
  <rect x="27" y="72" width="2" height="46" fill="#8a5a30" opacity="0.9"/>
  <!-- bark notches -->
  <rect x="25" y="82" width="10" height="2" fill="#3e2510" opacity="0.55"/>
  <rect x="25" y="100" width="10" height="2" fill="#3e2510" opacity="0.55"/>

  <!-- foliage: three stacked rounded clumps -->
  <g stroke="#1d4a1d" stroke-width="1.5">
    <ellipse cx="30" cy="62" rx="28" ry="18" fill="#3aa14a"/>
    <ellipse cx="18" cy="44" rx="16" ry="14" fill="#46b558"/>
    <ellipse cx="42" cy="42" rx="17" ry="15" fill="#46b558"/>
    <ellipse cx="30" cy="28" rx="20" ry="16" fill="#52c466"/>
  </g>
  <!-- inner highlights -->
  <ellipse cx="24" cy="22" rx="6" ry="4" fill="#7bd987" opacity="0.85"/>
  <ellipse cx="14" cy="40" rx="4" ry="3" fill="#7bd987" opacity="0.7"/>
  <ellipse cx="40" cy="56" rx="6" ry="4" fill="#7bd987" opacity="0.55"/>
</svg>
