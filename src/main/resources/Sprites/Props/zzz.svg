<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sleep "ZZZ" prop floated next to a sleeping pet (Pet.sleep -> showProp).

  Redesigned to match the pixel-art Heart tile style:
   * Same 64x64 viewBox so the propLabel (square) doesn't visually
     squash the art.
   * Content bounding box ~= viewBox bounding box (centered, no tall
     skinny column like the previous text-based version), so the Zs
     don't appear "too tall and offset" inside the square slot.
   * White fill + dark blue outline + light highlight, mirroring the
     heart tile's fill/stroke/shine layering.

  Three Zs of decreasing size walk diagonally from bottom-left to
  top-right (the conventional "fading off to sleep" direction).
-->
<!-- viewBox padded so the artwork (x 6..54, y 6..56) occupies ~54% of the
     rendered sprite square - matches bone/ball/food (~50-55%) so the
     ZZZ no longer renders visibly larger than the other props. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -14 90 90" width="90" height="90">
  <!-- White fill body -->
  <g fill="#ffffff" stroke="#1d3a78" stroke-width="2" stroke-linejoin="miter">
    <!-- big Z, bottom-left -->
    <polygon points="6,32 30,32 30,37 12,51 30,51 30,56 6,56 6,51 24,37 6,37"/>
    <!-- medium Z, middle -->
    <polygon points="24,18 42,18 42,22 30,32 42,32 42,36 24,36 24,32 36,22 24,22"/>
    <!-- small Z, top-right -->
    <polygon points="42,6 54,6 54,9 47,15 54,15 54,18 42,18 42,15 49,9 42,9"/>
  </g>
  <!-- Light highlight along the top edge of each Z's top bar -->
  <g fill="#a8c2f0" stroke="none">
    <rect x="7"  y="33" width="22" height="1"/>
    <rect x="25" y="19" width="16" height="1"/>
    <rect x="43" y="7"  width="10" height="1"/>
  </g>
</svg>
