<?xml version="1.0" encoding="UTF-8"?>
<!-- The bone artwork (knobs at cx=22/78 with r=10) spans x=12..88 in its
     native 100-unit coord system (~76% of the canvas), which made it render
     visibly larger than ball/seed (~55-60% of canvas). Pad the viewBox out
     so the bone occupies ~54% of the rendered sprite square. Art
     coordinates are unchanged. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 140 140">
  <ellipse cx="50" cy="82" rx="32" ry="5" fill="#000" opacity="0.22"/>
  <!-- bone body + four knobs -->
  <g fill="#f5ecd0" stroke="#7a6a3a" stroke-width="2.5" stroke-linejoin="round">
    <rect x="22" y="50" width="56" height="14" rx="6"/>
    <circle cx="22" cy="48" r="10"/>
    <circle cx="22" cy="66" r="10"/>
    <circle cx="78" cy="48" r="10"/>
    <circle cx="78" cy="66" r="10"/>
  </g>
  <!-- highlight -->
  <rect x="28" y="53" width="42" height="3" rx="1.5" fill="#fffaea" opacity="0.85"/>
</svg>
