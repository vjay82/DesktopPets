<rect x="14" y="24" width="3" height="1" fill="#158968"/>
<rect x="17" y="24" width="1" height="1" fill="#000000"/>
<!-- RAISED LEFT WING: extra teal wedge sticking up-left from body -->
<rect x="9" y="22" width="1" height="1" fill="#000000"/>
<rect x="9" y="23" width="2" height="1" fill="#158968"/>
<rect x="11" y="23" width="1" height="1" fill="#000000"/>
<rect x="8" y="23" width="1" height="1" fill="#000000"/>
<rect x="8" y="24" width="1" height="1" fill="#158968"/>
<rect x="9" y="24" width="2" height="1" fill="#158968"/>
<rect x="11" y="24" width="1" height="1" fill="#000000"/>
<rect x="9" y="25" width="2" height="1" fill="#158968"/>
