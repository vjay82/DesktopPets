-->
<!-- Head -->
<rect x="14" y="19" width="3" height="1" fill="#000000"/>
<rect x="13" y="20" width="1" height="1" fill="#000000"/>
<rect x="14" y="20" width="3" height="1" fill="#37446e"/>
<rect x="17" y="20" width="1" height="1" fill="#000000"/>
<rect x="13" y="21" width="1" height="1" fill="#000000"/>
<rect x="14" y="21" width="3" height="1" fill="#37446e"/>
<rect x="17" y="21" width="1" height="1" fill="#000000"/>
<!-- Body + green wing patch -->
<rect x="13" y="22" width="1" height="1" fill="#000000"/>
<rect x="14" y="22" width="1" height="1" fill="#37446e"/>
<rect x="15" y="22" width="1" height="1" fill="#158968"/>
<rect x="16" y="22" width="1" height="1" fill="#000000"/>
<rect x="12" y="23" width="1" height="1" fill="#000000"/>
<rect x="13" y="23" width="1" height="1" fill="#37446e"/>
<rect x="14" y="23" width="2" height="1" fill="#158968"/>
