<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
<!--
  Bird scratch pose: based on Idle/tile001 with the LEFT wing raised
